services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file: docker.env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "echo DATABASE_URL=$$DATABASE_URL && node_modules/.bin/prisma migrate deploy && node dist/src/main.js"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
